{% extends "base.html" %}
{% block title %}Analytics — Spendly{% endblock %}

{% block content %}
<section class="analytics-section">
    <div class="analytics-card">
        <div class="analytics-deco analytics-deco--tr"></div>
        <div class="analytics-deco analytics-deco--bl"></div>

        <div class="analytics-icon-wrap">
            <div class="analytics-icon">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
                    <polyline points="12 7 12 12 15.5 14.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <span class="analytics-badge">Coming Soon</span>

        <h1 class="analytics-title">Advanced Analytics</h1>

        <p class="analytics-body">
            We're working on powerful insights and visualizations to help you
            understand your spending patterns better.
        </p>

        <div class="analytics-dots">
            <span class="analytics-dot analytics-dot--on"></span>
            <span class="analytics-dot analytics-dot--on"></span>
            <span class="analytics-dot analytics-dot--off"></span>
        </div>

        <p class="analytics-sub">We're crafting something special</p>
    </div>
</section>
{% endblock %}
