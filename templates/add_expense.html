{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new spending entry</p>
        </div>
        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (৳)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input"
                           step="0.01" min="0.01"
                           value="{{ form.amount | default('') }}"
                           placeholder="0.00"
                           required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not form.category %}selected{% endif %}>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                            {% if form.category == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ form.date | default(today) }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="form-optional">(optional)</span></label>
                    <textarea id="description" name="description"
                              class="form-input form-textarea"
                              maxlength="200"
                              placeholder="What was this for?">{{ form.description | default('') }}</textarea>
                </div>

                <button type="submit" class="btn-submit">Add Expense</button>
            </form>

            <a href="{{ url_for('profile') }}" class="expense-form-back">← Back to Profile</a>
        </div>
    </div>
</section>
{% endblock %}
